name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Show project structure
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== App folder ==="
          ls -la app/ || echo "No app/ folder"
          find . -name "build.gradle.kts" | head -10
          find . -name "gradlew" | head -5

      - name: Create .env file
        run: echo "GEMINI_API_KEY=placeholder" > .env

      - name: Fix signing config in build.gradle.kts
        run: |
          FILE="app/build.gradle.kts"
          if [ -f "$FILE" ]; then
            echo "Found $FILE — removing signingConfig line"
            sed -i '/signingConfig/d' "$FILE"
            echo "Done. Relevant lines:"
            grep -n "signing\|debug\|release" "$FILE" || echo "No signing lines remain"
          else
            echo "ERROR: $FILE not found"
            find . -name "*.kts" | head -10
            exit 1
          fi

      - name: Make gradlew executable
        run: |
          GRADLEW=$(find . -name "gradlew" | head -1)
          echo "Found gradlew at: $GRADLEW"
          chmod +x "$GRADLEW"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: |
          GRADLEW=$(find . -name "gradlew" | head -1)
          echo "Running: $GRADLEW assembleDebug"
          "$GRADLEW" assembleDebug --stacktrace

      - name: Find and copy APK
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" | head -10
          APK=$(find . -name "app-debug.apk" | head -1)
          echo "Found APK: $APK"
          mkdir -p .build-outputs APK_DOWNLOAD
          cp "$APK" .build-outputs/app-debug.apk
          cp "$APK" APK_DOWNLOAD/app-debug.apk

      - name: Verify APK is real
        run: |
          SIZE=$(stat -c%s "APK_DOWNLOAD/app-debug.apk")
          echo "APK size: $SIZE bytes"
          if [ "$SIZE" -gt 1000000 ]; then
            echo "✅ APK is valid (greater than 1MB)"
          else
            echo "❌ APK too small — build failed"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: APK_DOWNLOAD/app-debug.apk
          retention-days: 7
