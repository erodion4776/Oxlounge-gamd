name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create .env file
        run: echo "GEMINI_API_KEY=placeholder" > .env

      - name: Fix signing config in build.gradle.kts
        run: |
          sed -i '/signingConfig = signingConfigs.getByName("debugConfig")/d' app/build.gradle.kts

      - name: Make gradlew executable
        run: |
          find . -name "gradlew" -exec chmod +x {} \;
          ls -la gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Create output folders
        run: mkdir -p .build-outputs APK_DOWNLOAD

      - name: Copy APK to output folders
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk .build-outputs/app-debug.apk
          cp app/build/outputs/apk/debug/app-debug.apk APK_DOWNLOAD/app-debug.apk

      - name: Verify APK is real
        run: |
          SIZE=$(stat -c%s "APK_DOWNLOAD/app-debug.apk")
          echo "APK size: $SIZE bytes"
          if [ "$SIZE" -gt 1000000 ]; then
            echo "✅ APK is valid (greater than 1MB)"
          else
            echo "❌ APK is too small — build failed"
            exit 1
          fi

      - name: Upload APK as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: APK_DOWNLOAD/app-debug.apk
          retention-days: 7
