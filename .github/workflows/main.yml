name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Show project structure
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== settings.gradle.kts ==="
          cat settings.gradle.kts 2>/dev/null || cat settings.gradle 2>/dev/null || echo "Not found"
          echo "=== build.gradle.kts ==="
          cat build.gradle.kts 2>/dev/null || echo "Not found"

      - name: Create .env file
        run: echo "GEMINI_API_KEY=placeholder" > .env

      - name: Fix signing config
        run: |
          for f in build.gradle.kts app/build.gradle.kts; do
            if [ -f "$f" ]; then
              sed -i '/signingConfig/d' "$f"
              echo "✅ Fixed: $f"
            fi
          done

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace 2>&1 | tail -150

      - name: Find and copy APK
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" | head -10
          APK=$(find . -name "app-debug.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ No APK found"
            exit 1
          fi
          echo "✅ Found: $APK"
          mkdir -p .build-outputs APK_DOWNLOAD
          cp "$APK" .build-outputs/app-debug.apk
          cp "$APK" APK_DOWNLOAD/app-debug.apk
          ls -lh APK_DOWNLOAD/app-debug.apk

      - name: Verify APK size
        run: |
          SIZE=$(stat -c%s "APK_DOWNLOAD/app-debug.apk")
          echo "APK size: $SIZE bytes"
          if [ "$SIZE" -gt 1000000 ]; then
            echo "✅ Valid APK (greater than 1MB)"
          else
            echo "❌ APK too small"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: APK_DOWNLOAD/app-debug.apk
          retention-days: 7
